name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: |
          npm install -g @expo/cli
          mkdir app
          echo 'export default function(){return <div>工时统计</div>}' > app/_layout.tsx
          echo '{"expo":{"name":"工时统计","version":"1.0.0","android":{"package":"com.workhours.app"}}}' > app.json
          echo 'module.exports=function(){return{main:"expo-router/entry",dependencies:{"expo":"~54.0.0"}}}'
      - run: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: android/app/build/outputs/apk/debug/app-debug.apk
