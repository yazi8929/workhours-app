                    <Text style={styles.cardTitle}>本月工作日</Text>
                    <Text style={styles.cardValue}>120 天</Text>
                  </View>

                  <Text style={styles.sectionTitle}>最近记录</Text>
                  {workLogs.map((log, index) => (
                    <View key={index} style={styles.logItem}>
                      <Text style={styles.logDate}>{log.date}</Text>
                      <Text style={styles.logProject}>{log.project}</Text>
                      <Text style={styles.logWorkers}>人员: {log.workers}</Text>
                      <Text style={styles.logHours}>工时: {log.hours}</Text>
                    </View>
                  ))}
                </ScrollView>

                <TouchableOpacity style={styles.addButton}>
                  <Text style={styles.addButtonText}>+ 记录工时</Text>
                </TouchableOpacity>
              </View>
            );
          }

