name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Init React Native project
        run: npx @react-native-community/cli init WorkHoursApp --skip-install
      - name: Install dependencies
        run: |
          cd WorkHoursApp
          npm install
          npm install @react-navigation/native @react-navigation/native-stack react-native-screens react-native-safe-area-context
      - name: Create app files
        run: |
          cd WorkHoursApp
          
          mkdir -p src/screens
          cat > src/screens/HomeScreen.tsx << 'EOF'
          import React from 'react';
          import { View, Text, StyleSheet } from 'react-native';

          export default function HomeScreen() {
            return (
              <View style={styles.container}>
                <View style={styles.header}>
                  <Text style={styles.title}>工时统计</Text>
                </View>
                <View style={styles.content}>
                  <View style={styles.card}>
                    <Text style={styles.cardTitle}>欢迎使用</Text>
                    <Text style={styles.cardValue}>工时统计系统</Text>
                  </View>
                </View>
              </View>
            );
          }

          const styles = StyleSheet.create({
            container: { flex: 1, backgroundColor: '#f5f5f5' },
            header: { backgroundColor: '#4F46E5', padding: 20, paddingTop: 40 },
            title: { color: '#fff', fontSize: 24, fontWeight: 'bold' },
            content: { padding: 20 },
            card: { backgroundColor: '#fff', padding: 20, borderRadius: 10 },
            cardTitle: { fontSize: 14, color: '#666' },
            cardValue: { fontSize: 24, fontWeight: 'bold', color: '#4F46E5' },
          });
          EOF

          mkdir -p src/navigation
          cat > src/navigation/AppNavigator.tsx << 'EOF'
          import React from 'react';
          import { NavigationContainer } from '@react-navigation/native';
          import { createNativeStackNavigator } from '@react-navigation/native-stack';
          import HomeScreen from '../screens/HomeScreen';

          const Stack = createNativeStackNavigator();

          export default function AppNavigator() {
            return (
              <NavigationContainer>
                <Stack.Navigator>
                  <Stack.Screen name="Home" component={HomeScreen} options={{ headerShown: false }} />
                </Stack.Navigator>
              </NavigationContainer>
            );
          }
          EOF

          cat > App.tsx << 'EOF'
          import React from 'react';
          import AppNavigator from './src/navigation/AppNavigator';
          export default function App() {
            return <AppNavigator />;
          }
          EOF
      - name: Build Android APK
        run: |
          cd WorkHoursApp/android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Find APK
        run: find WorkHoursApp -name "*.apk" -type f
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: WorkHoursApp/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error


