name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install -g @expo/cli eas-cli
      - run: |
          mkdir -p client
          cd client
          npm init -y
      - run: |
          cd client
          cat > package.json << 'EOF'
          {
            "name": "workhours",
            "version": "1.0.0",
            "main": "expo-router/entry",
            "scripts": {
              "start": "expo start",
              "android": "expo run:android",
              "ios": "expo run:ios"
            },
            "dependencies": {
              "expo": "~52.0.0",
              "react": "18.3.1",
              "react-native": "0.76.5",
              "expo-router": "~4.0.0",
              "expo-status-bar": "~2.0.0"
            }
          }
          EOF
      - run: |
          cd client
          mkdir app assets
          echo 'export default function(){return <div>工时统计</div>}' > app/_layout.tsx
          echo '{"expo":{"name":"工时统计","slug":"workhours","version":"1.0.0","android":{"package":"com.workhours.app"}}}' > app.json
          echo "placeholder" > assets/icon.png
      - name: Build with EAS
        run: |
          cd client
          npx eas build --platform android --local --output ../app.apk
        env:
          EXPO_NO_DOCTOR: 1
          EXPO_SKIP_VALIDATION: 1
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.apk

