name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install -g @expo/cli
      - run: |
          mkdir -p client
          cd client
          npm init -y
          npm install expo@^50.0.0 react react-native
      - run: |
          cd client
          mkdir app assets
          echo 'export default function(){return <div>App</div>}' > app/_layout.tsx
          echo '{"expo":{"name":"工时统计","slug":"workhours","version":"1.0.0","android":{"package":"com.workhours.app"}}}' > app.json
      - name: Prebuild Android
        run: |
          cd client
          npx expo prebuild --platform android
        env:
          EXPO_NO_DOCTOR: 1
          EXPO_SKIP_VALIDATION: 1
      - run: cd client/android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
