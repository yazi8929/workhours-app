name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: |
          mkdir -p client
          cd client
          echo '{"name":"workhours","version":"1.0.0"}' > package.json
          echo '{"expo":{"name":"工时统计","slug":"workhours","version":"1.0.0","android":{"package":"com.workhours.app"}}}' > app.json
          mkdir -p app assets
          echo "placeholder" > assets/icon.png
          echo 'import {Text,View} from "react-native";export default function(){return <View style={{flex:1,justifyContent:"center",alignItems:"center"}}><Text>工时统计</Text></View>}' > app/index.tsx
          echo 'import {Stack} from "expo-router";export default function(){return <Stack><Stack.Screen name="index"/></Stack>}' > app/_layout.tsx
      - run: npm install -g @expo/cli && cd client && npx expo prebuild --platform android --clean
      - run: cd client/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
