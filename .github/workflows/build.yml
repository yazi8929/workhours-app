name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: |
          npx @react-native-community/cli init WorkHoursApp --skip-install
          cd WorkHoursApp
          npm install
          npm install @react-navigation/native @react-navigation/stack react-native-screens react-native-safe-area-context
      - run: |
          cd WorkHoursApp
          cat > app.json << 'EOF'
          {
            "name": "工时统计",
            "displayName": "工时统计"
          }
          EOF
      - name: Build Android APK
        run: |
          cd WorkHoursApp/android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: WorkHoursApp/android/app/build/outputs/apk/debug/app-debug.apk

